       y="79.356408"><tspan
         style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:13.8847px;font-family:Garamond;-inkscape-font-specification:Garamond;text-align:center;text-anchor:middle;fill:#ffffff">sans réduire. 
</tspan></tspan><tspan
       x="152.29395"
       y="96.712281"><tspan
         style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:13.8847px;font-family:Garamond;-inkscape-font-specification:Garamond;text-align:center;text-anchor:middle;fill:#ffffff">
</tspan></tspan><tspan
       x="47.087514"
       y="114.06815"><tspan
         style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:13.8847px;font-family:Garamond;-inkscape-font-specification:Garamond;text-align:center;text-anchor:middle;fill:#ffffff">Ce n'est pas l'homme qui est mauvais,
</tspan></tspan><tspan
       x="77.839954"
       y="131.42403"><tspan
         style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:13.8847px;font-family:Garamond;-inkscape-font-specification:Garamond;text-align:center;text-anchor:middle;fill:#ffffff">c'est le singe qui est malin,
</tspan></tspan><tspan
       x="56.931549"
       y="148.7799"><tspan
         style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:13.8847px;font-family:Garamond;-inkscape-font-specification:Garamond;text-align:center;text-anchor:middle;fill:#ffffff">mais le message du singe est sage.
</tspan></tspan><tspan
       x="152.29395"
       y="166.13578"><tspan
         style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:13.8847px;font-family:Garamond;-inkscape-font-specification:Garamond;text-align:center;text-anchor:middle;fill:#ffffff">
</tspan></tspan><tspan
       x="103.54834"
       y="183.49166"><tspan
         style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:13.8847px;font-family:Garamond;-inkscape-font-specification:Garamond;text-align:center;text-anchor:middle;fill:#ffffff">J’invite et j’évite,
</tspan></tspan><tspan
       x="96.239893"
       y="200.84754"><tspan
         style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:13.8847px;font-family:Garamond;-inkscape-font-specification:Garamond;text-align:center;text-anchor:middle;fill:#ffffff">j’avance et j’évince,
</tspan></tspan><tspan
       x="98.043277"
       y="218.20342"><tspan
         style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:13.8847px;font-family:Garamond;-inkscape-font-specification:Garamond;text-align:center;text-anchor:middle;fill:#ffffff">j'adore et j’abhorre.
</tspan></tspan><tspan
