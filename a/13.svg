</tspan></tspan><tspan
       x="122.23303"
       y="62.000534"><tspan
         style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:13.8847px;font-family:Garamond;-inkscape-font-specification:Garamond;text-align:center;text-anchor:middle;fill:#ffffff">de séduire 
</tspan></tspan><tspan
